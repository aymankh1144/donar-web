    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            
            /* -- أكواد الباتيرن -- */
            background-color: #000000; /* لون خلفية احتياطي */
            background-image: url('pattern.png'); /* ضع اسم صورة الباتيرن هنا */
            background-repeat: repeat; /* هذا الأمر هو ما يجعل الصورة تتكرر كباتيرن */
            background-size: 150px; /* للتحكم بحجم الباتيرن (يمكنك تكبير أو تصغير الرقم) */
            
            /* إضافة طبقة داكنة فوق الباتيرن حتى لا يزعج العين (اختياري) */
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.7); 
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .logo-container {
            margin-bottom: 50px;
            text-align: center;
            z-index: 10;
        }

        .logo-container img {
            width: 250px;
            max-width: 80vw;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            transition: 0.3s ease-in-out;
        }

        .logo-container img:hover {
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
            transform: scale(1.02);
        }

        .menu {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

       .toggle {
            position: relative;
            height: 65px;
            width: 65px;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 3px 15px rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            cursor: pointer;
            transition: 0.5s; /* تسريع الحركة قليلاً لتكون أنعم */
            z-index: 1000;
            text-align: center;
        }

        /* تنسيق كلمة Click me */
        .click-text {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.1;
            transition: 0.3s;
            font-family: Arial, sans-serif;
        }

        /* تنسيق أيقونة الإغلاق (مخفية في البداية) */
        .close-icon {
            position: absolute;
            opacity: 0;
            transform: scale(0);
            transition: 0.3s;
            display: flex;
        }

        /* دوران الزر عند الفتح */
        .menu.active .toggle {
            transform: rotate(180deg);
        }

        /* إخفاء الكلمة عند فتح القائمة */
        .menu.active .click-text {
            opacity: 0;
            transform: scale(0);
        }

        /* إظهار علامة الإغلاق عند فتح القائمة */
        .menu.active .close-icon {
            opacity: 1;
            transform: scale(1.2);
        }
        .menu li {
            position: absolute;
            left: 0;
            list-style: none;
            transform-origin: 120px; 
            transition: 0.5s;
            transition-delay: calc(0.1s * var(--i));
            transform: rotate(0deg) translateX(80px);
        }

   .menu.active li {
            transform: rotate(calc((72deg * var(--i)) + 90deg));
        }

       .menu li a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(calc((-72deg * var(--i)) - 90deg));
            color: var(--clr);
            box-shadow: 0 3px 4px rgba(0,0,0,0.15);
            transition: 0.3s;
            text-decoration: none;
        }

        .menu li a:hover {
            color: #fff;
            background: var(--clr);
            box-shadow: 0 0 10px var(--clr), 0 0 30px var(--clr);
        }
    </style>
